        return `
        <div class="post-card" onclick="location.href='${post.filename}'">
            <div class="card-thumb"><img src="${post.thumbnail}" alt="${post.title}" loading="lazy"></div>
            <div class="card-body">
                <span class="card-cat">${post.category}</span>
                <div class="card-title">${post.title}</div>
                <div class="card-desc">${post.excerpt || ''}</div>
            </div>
        </div>`;
    }

    function render(reset = false) {
        filteredPosts = getFiltered();
        if (reset) {
            currentPage = 1;
            postGrid.innerHTML = '';
            if(heroContainer) heroContainer.innerHTML = '';
        }

        if (filteredPosts.length === 0) {
            postGrid.innerHTML = '<p style="padding:40px; text-align:center; color:#94a3b8; grid-column:1/-1;">결과가 없습니다.</p>';
            loadMoreWrap.style.display = 'none'; return;
        }

        let itemsToRender =[];
        if (currentPage === 1) {
            if(heroContainer) heroContainer.innerHTML = renderHeroCard(filteredPosts[0]);
            itemsToRender = filteredPosts.slice(1, PER_PAGE + 1);
        } else {
            const start = (currentPage - 1) * PER_PAGE + 1;
            itemsToRender = filteredPosts.slice(start, start + PER_PAGE);
        }

        postGrid.innerHTML += itemsToRender.map(p => renderCard(p)).join('');
        const shown = (currentPage === 1) ? itemsToRender.length + 1 : ((currentPage - 1) * PER_PAGE + 1) + itemsToRender.length;
        loadMoreWrap.style.display = shown < filteredPosts.length ? 'block' : 'none';
    }

    document.getElementById('load-more-btn').addEventListener('click', () => { currentPage++; render(false); });

    document.querySelectorAll('.cat-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); activeTag = btn.dataset.tag; render(true);
        });
    });

    if (headerSearch) {
        headerSearch.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); render(true); }
        });
    }

    render(true);
})();
</script>
</body>
</html>
