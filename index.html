posts.sort((a,b)=>b.id-a.id);
const PER=10;let page=1,filtered=[];
const heroC=document.getElementById('hero-post-container'),grid=document.getElementById('post-grid'),lmw=document.getElementById('load-more-wrap'),si=document.querySelector('.search-input');

const formatTitle = (t, isHero) => {
    const m = t.match(/\(([^)]+)\)/);
    if(m) {
        return isHero
            ? `<div class="hero-sub-title">${m[1]}</div><div class="hero-title">${t.replace(m[0], '').trim()}</div>`
            : `<div class="card-sub-title">${m[1]}</div><div class="card-title">${t.replace(m[0], '').trim()}</div>`;
    }
    return isHero ? `<div class="hero-title">${t}</div>` : `<div class="card-title">${t}</div>`;
};

const heroCard=p=>`<a href="${p.filename}" class="hero-post">
<div class="hero-thumb"><img src="${p.thumbnail}" alt="${p.title}" fetchpriority="high"></div>
<div class="hero-overlay"></div>
<div class="hero-info">

</div>
</a>`;

const postCard=p=>`<a href="${p.filename}" class="post-card">
<div class="card-thumb"><img src="${p.thumbnail}" alt="${p.title}" loading="lazy"><div class="card-score"><span class="card-score-num">9.2</span><span class="card-score-total">/10</span></div></div>

</div>
<div class="card-btn">리뷰 읽어보기</div>
</div>
</a>`;

const banner=`<div class="inline-banner" style="grid-column:1/-1;">
<div class="ib-text"><h3>Editor's Choice : 신학기 노트북 가이드</h3><p>스펙부터 실사용 후기까지, 용도별 최적의 선택을 만나보세요.</p></div>
<div class="ib-btn">컬렉션 보기</div>
</div>`;

const getF=()=>{const kw=(si?si.value:'').toLowerCase().trim();return posts.filter(p=>{return !kw||p.title.toLowerCase().includes(kw)||(p.excerpt||'').toLowerCase().includes(kw)||(p.category||'').toLowerCase().includes(kw);});};

function render(reset=false){
  filtered=getF();if(reset){page=1;grid.innerHTML='';if(heroC)heroC.innerHTML='';}
  if(!filtered.length){grid.innerHTML='<p style="padding:40px;text-align:center;color:#94a3b8;grid-column:1/-1;font-size:14px;">검색 결과가 없습니다.</p>';lmw.style.display='none';return;}
  let items=[];
  if(page===1){if(heroC)heroC.innerHTML=heroCard(filtered[0]);items=filtered.slice(1,PER+1);}
  else{const s=(page-1)*PER+1;items=filtered.slice(s,s+PER);}
  let html='';items.forEach((p,i)=>{html+=postCard(p);if(page===1&&i===3)html+=banner;});
  grid.innerHTML+=html;
  const shown=page===1?items.length+1:(page-1)*PER+1+items.length;
  lmw.style.display=shown<filtered.length?'flex':'none';
}

document.getElementById('load-more-btn').addEventListener('click',()=>{page++;render(false);});
if(si)si.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();render(true);}});

const sb=document.getElementById('global-search-box');
if(si&&sb){
  const dd=document.createElement('div');dd.className='live-search-dropdown';sb.appendChild(dd);
  si.addEventListener('input',e=>{
    const kw=e.target.value.toLowerCase().trim();
    if(!kw){dd.style.display='none';return;}
    const m=posts.filter(p=>p.title.toLowerCase().includes(kw)||(p.excerpt||'').toLowerCase().includes(kw)).slice(0,5);
    dd.innerHTML=m.length?m.map(p=>`<a href="${p.filename}" class="live-search-item"><img src="${p.thumbnail}" class="ls-thumb" alt=""><div class="ls-info"><div class="ls-title">${p.title}</div><div class="ls-cat">${p.category}</div></div></a>`).join(''):'<div style="padding:16px;text-align:center;color:#94a3b8;font-size:13px;">검색 결과가 없습니다.</div>';
    dd.style.display='block';
  });
  si.addEventListener('focus',()=>{if(si.value.trim())dd.style.display='block';});
  document.addEventListener('click',e=>{if(!sb.contains(e.target))dd.style.display='none';});
}

document.querySelectorAll('.tag-cloud-item').forEach(b=>b.addEventListener('click',()=>{
  if(si){ si.value=b.dataset.tag; render(true); }
  window.scrollTo({top:0,behavior:'smooth'});
}));

const mb=document.getElementById('m-menu-toggle'),sd=document.getElementById('mobile-sidebar'),ov=document.getElementById('sidebar-overlay'),cb=document.getElementById('m-sidebar-close');
if(mb)mb.onclick=()=>{sd.classList.add('active');ov.classList.add('active');};
const cl=()=>{sd.classList.remove('active');ov.classList.remove('active');};
if(cb)cb.onclick=cl;if(ov)ov.onclick=cl;

render(true);
})();
</script>
