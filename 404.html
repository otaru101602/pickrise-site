<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | PickRise</title>
    
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="https://pickrise.com/images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Noto+Serif+KR:wght@400;600;700;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>

    <style>
        
:root {
  /* 👇 연한 쿨그레이 배경색 추가 👇 */
  --bg-page: #f8fafc;
  --white: #ffffff; --off: #f1f5f9; --border: #e2e8f0; --border-md: #cbd5e1;
  --dark: #0f172a; --dark2: #1e293b;
  --ink: #0f172a; --ink-70: #334155; --ink-50: #475569; --ink-35: #64748b; --ink-20: #94a3b8; --ink-10: #cbd5e1;
  /* 👇 촌스럽던 파란색을 트렌디한 일렉트릭 블루로 완벽 교체 👇 */
  --blue: #2563eb; --blue-d: #1d4ed8; --blue-m: #3b82f6; --blue-l: #eff6ff; --blue-b: rgba(37,99,235,.15);

  --f-serif: 'Noto Serif KR', 'Georgia', serif;
  --f-sans: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  --f-mono: 'system-ui', 'Courier New', monospace;
  --f-disp: 'Bebas Neue', sans-serif;
  --max-w: 1280px; --gutter: 68px; --hh: 78px; --fh: 64px;
  --r-2xl: 28px; --r-xl: 22px; --r-lg: 16px; --r-md: 11px; --r-sm: 7px;

  /* 👇 그림자를 더 맑고 투명하게 변경 👇 */
  --sh-xs: 0 1px 2px rgba(15,23,42,.04);
  --sh-sm: 0 1px 3px rgba(15,23,42,.04), 0 6px 18px rgba(15,23,42,.055);
  --sh-md: 0 2px 6px rgba(15,23,42,.04), 0 12px 32px rgba(15,23,42,.07);
  --sh-lg: 0 4px 10px rgba(15,23,42,.04), 0 24px 60px rgba(15,23,42,.09);
  --sh-hero: 0 20px 60px rgba(37,99,235,.06), 0 4px 12px rgba(15,23,42,.04);
  --ease-out-expo: cubic-bezier(.16,1,.3,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 17.5px; text-rendering: optimizeLegibility; }
/* 👇 body 배경색을 순백색에서 연한 쿨그레이로 변경 👇 */
body { font-family: var(--f-sans); background: #edf0f4; color: var(--ink); line-height: 1.7; -webkit-font-smoothing: antialiased; letter-spacing: -.022em; overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }
button { font-family: var(--f-sans); cursor: pointer; border: none; background: none; }
::selection { background: var(--blue-l); color: var(--blue); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-20); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-35); }

#progress-bar { position: fixed; top: 0; left: 0; height: 3px; width: 0%; background: linear-gradient(90deg, var(--blue-m) 0%, var(--blue) 100%); z-index: 9999; transition: width .08s linear; border-radius: 0 2px 2px 0; box-shadow: 0 0 8px var(--blue-b); }

.site-header { position: sticky; top: 0; z-index: 800; background: rgba(255,255,255,.98); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); transition: border-color .25s, box-shadow .3s; }
.site-header.scrolled { border-color: var(--border-md); box-shadow: var(--sh-xs); }
.header-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter); height: var(--hh); display: flex; align-items: center; justify-content: space-between; gap: 40px; position: relative; }
.logo { display: flex; align-items: center; flex-shrink: 0; text-decoration: none; }
.site-nav { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 0; }
.site-nav a { position: relative; font-size: 15.5px; font-weight: 700; color: var(--ink-50); padding: 8px 20px; border-radius: 50px; transition: color .18s; letter-spacing: -.01em; white-space: nowrap; }
.site-nav a::after { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 0; height: 3px; border-radius: 2px; background: var(--blue); transition: width .2s var(--ease-out-expo); }
.site-nav a:hover { color: var(--ink); }
.site-nav a:hover::after { width: 24px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-wrap { position: relative; }
.search-field { width: 244px; padding: 10px 18px 10px 42px; font-size: 14.5px; font-family: var(--f-sans); font-weight: 600; background: var(--off); border: 1.5px solid transparent; border-radius: 50px; color: var(--ink); outline: none; transition: width .3s var(--ease-out-expo), background .2s, border-color .2s, box-shadow .2s; letter-spacing: -.01em; }
.search-field::placeholder { color: var(--ink-35); }
.search-field:focus { background: var(--white); border-color: var(--blue-m); width: 308px; box-shadow: 0 0 0 4px var(--blue-b); }
.search-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-35); font-size: 16px; pointer-events: none; transition: color .2s; }
.search-wrap:focus-within .search-ico { color: var(--blue-m); }
.icon-btn { display: none; width: 42px; height: 42px; border-radius: 50%; align-items: center; justify-content: center; color: var(--ink); font-size: 21px; transition: background .18s, transform .18s; }
.icon-btn:hover { background: var(--border); }
.icon-btn:active { transform: scale(.93); }

.overlay { position: fixed; inset: 0; background: rgba(15,23,42,.6); z-index: 990; display: none; backdrop-filter: blur(8px); }
.overlay.on { display: block; }
.drawer { position: fixed; top: 0; right: -360px; width: 360px; height: 100dvh; background: var(--white); z-index: 1000; padding: 32px 28px; display: flex; flex-direction: column; overflow-y: auto; transition: right .36s var(--ease-out-expo); box-shadow: var(--sh-lg); }
.drawer.on { right: 0; }
.drawer-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.drawer-close { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--ink); cursor: pointer; transition: background .18s; }
.drawer-close:hover { background: var(--off); }
.drawer-nav { display: flex; flex-direction: column; gap: 2px; }
.drawer-nav a { font-size: 17px; font-weight: 600; color: var(--ink); padding: 14px 14px; border-radius: var(--r-md); transition: background .16s; letter-spacing: -.02em; }
.drawer-nav a:hover { background: var(--off); }
.search-bar-mob { display: none; position: fixed; top: var(--hh); left: 0; right: 0; z-index: 690; background: var(--white); padding: 13px 24px; border-bottom: 1px solid var(--border-md); box-shadow: var(--sh-sm); }
.search-bar-mob.on { display: block; }
.search-bar-mob .search-field { width: 100%; border-radius: var(--r-lg); }

.site-footer { background: var(--dark); padding: 88px var(--gutter) 40px; margin-top: 80px; }
.footer-inner { max-width: var(--max-w); margin: 0 auto; display: grid; grid-template-columns: 2.2fr 1fr 1fr 1fr; gap: 60px; padding-bottom: 64px; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 28px; }
.footer-logo { display: flex; align-items: center; margin-bottom: 16px; filter: brightness(0) invert(1); }
.footer-about { font-size: 15px; line-height: 1.74; color: rgba(255,255,255,.5); max-width: 280px; word-break: keep-all; }
.fcol h4 { font-family: var(--f-mono); font-size: 10px; font-weight: 600; color: rgba(255,255,255,.3); letter-spacing: .26em; text-transform: uppercase; margin-bottom: 20px; }
.fcol a { display: block; font-size: 15.5px; color: rgba(255,255,255,.6); margin-bottom: 13px; transition: color .18s; letter-spacing: -.01em; }
.fcol a:hover { color: var(--white); }
.footer-bottom { max-width: var(--max-w); margin: 0 auto; display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; color: rgba(255,255,255,.3); }
.footer-mono { font-family: var(--f-mono); letter-spacing: .12em; font-size: 10.5px; }

/* Sidebar Widgets (Shared) */
.sidebar { display: flex; flex-direction: column; gap: 24px; position: sticky; top: calc(var(--hh) + 32px); align-self: start; height: max-content; padding-bottom: 32px; z-index: 10; }
.widget { background: var(--white); border-radius: var(--r-xl); padding: 32px 28px; border: 1px solid var(--border); box-shadow: var(--sh-sm); transition: box-shadow .25s, transform .25s; }
.widget:hover { box-shadow: var(--sh-md); transform: translateY(-2px); }
.wlabel { font-family: var(--f-mono); font-size: 11px; font-weight: 600; color: var(--ink-35); letter-spacing: .25em; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
.wlabel::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.ad-box { border-radius: var(--r-xl); padding: 24px; border: 1px solid var(--border); background: var(--white); text-align: center; min-height: 104px; box-shadow: var(--sh-sm); }
.ad-label { font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .28em; color: var(--ink-35); text-transform: uppercase; margin-bottom: 12px; }

@media (max-width: 1440px) { :root { --gutter: 48px; } .sidebar { display: none; } .site-nav { display: none; } .footer-inner { grid-template-columns: 1fr 1fr; gap: 40px; } }
@media (max-width: 768px) { :root { --hh: 62px; --gutter: 22px; --fh: 58px; } html { font-size: 16px; } .search-wrap { display: none; } .icon-btn { display: flex; } .site-footer { padding: 64px var(--gutter) 32px; } .footer-inner { grid-template-columns: 1fr; gap: 36px; } .footer-bottom { flex-direction: column; gap: 8px; text-align: center; } }

        /* Static Page Editorial Styling */
        .static-wrap { max-width: 860px; margin: 80px auto 160px; padding: 0 var(--gutter); }
        .static-header { text-align: center; margin-bottom: 64px; }
        .static-title { font-family: var(--f-serif); font-size: 46px; font-weight: 700; color: var(--ink); margin-bottom: 16px; letter-spacing: -.03em; }
        .static-desc { font-size: 17.5px; color: var(--ink-50); letter-spacing: -.01em; }

        .static-content { font-size: 17px; line-height: 1.85; color: var(--ink-70); }
        .static-content h3 { font-family: var(--f-serif); font-size: 26px; font-weight: 700; color: var(--ink); margin: 64px 0 24px; border-bottom: 1px solid var(--border-md); padding-bottom: 16px; letter-spacing: -.02em;}
        .static-content p { margin-bottom: 24px; word-break: keep-all;}
        .static-content ul { padding-left: 24px; margin-bottom: 32px; }
        .static-content li { margin-bottom: 12px; }

        /* Contact Box */
        .contact-box { background: var(--off); border: 1px solid var(--border); border-radius: var(--r-2xl); padding: 56px 40px; text-align: center; box-shadow: var(--sh-sm); margin-bottom: 64px; }
        .contact-btn { display: inline-flex; align-items: center; gap: 12px; padding: 18px 42px; background: var(--ink); color: var(--white); font-size: 16.5px; font-weight: 700; border-radius: 50px; transition: all .24s var(--ease-out-expo); margin-top: 28px; position:relative; overflow:hidden;}
        .contact-btn:hover { background: var(--blue); transform: translateY(-4px); box-shadow: var(--sh-md); }
        @keyframes shine-sweep { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
        .contact-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%); transform: skewX(-20deg); animation: shine-sweep 3s infinite; }

        /* FAQ */
        .faq-item { border-bottom: 1px solid var(--border); padding: 28px 0; }
        .faq-q { font-size: 19px; font-weight: 700; color: var(--ink); margin-bottom: 14px; display: flex; gap: 14px; align-items: flex-start; letter-spacing: -.02em;}
        .faq-q::before { content: 'Q.'; color: var(--blue); font-family: var(--f-disp); font-size: 26px; line-height: 1; margin-top:2px;}
        .faq-a { font-size: 16.5px; color: var(--ink-50); display: flex; align-items: flex-start; padding-left: 36px; line-height: 1.7; word-break:keep-all;}

        /* 404 */
        .error-wrap { text-align: center; padding: 120px 0; }
        .error-code { font-family: var(--f-disp); font-size: 160px; color: var(--border-md); line-height: 1; margin-bottom: 24px; text-shadow: 4px 4px 0px var(--off);}

        @media (max-width: 768px) { .static-title { font-size: 32px; } .contact-box { padding: 40px 24px; } .static-wrap{ margin: 40px auto 100px; } }
    </style>
</head>
<body>
    
<div id="progress-bar"></div>
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <a href="https://pickrise.com/index.html" class="logo"><img src="https://pickrise.com/images/logo.png" alt="PickRise" style="height:42px; width:auto; transform:translateY(2px);"></a>
    <button class="drawer-close" id="drawer-close" aria-label="닫기">×</button>
  </div>
  <nav class="drawer-nav"><a href="https://pickrise.com/category-smart-device.html">스마트기기</a><a href="https://pickrise.com/category-pc-laptop.html">PC/노트북</a><a href="https://pickrise.com/category-home-appliance.html">생활가전</a><a href="https://pickrise.com/category-tech-trend.html">테크트렌드</a></nav>
</div>
<div class="search-bar-mob" id="search-bar-mob">
  <input class="search-field" id="search-mob" type="text" placeholder="기기명, 브랜드 검색" autocomplete="off">
</div>
<header class="site-header" id="site-header">
  <div class="header-inner">
    <a class="logo" href="https://pickrise.com/index.html"><img src="https://pickrise.com/images/logo.png" alt="PickRise" style="height:42px; width:auto; transform:translateY(2px);"></a>
    <nav class="site-nav"><a href="https://pickrise.com/category-smart-device.html">스마트기기</a><a href="https://pickrise.com/category-pc-laptop.html">PC/노트북</a><a href="https://pickrise.com/category-home-appliance.html">생활가전</a><a href="https://pickrise.com/category-tech-trend.html">테크트렌드</a></nav>
    <div class="header-right">
      <div class="search-wrap" id="search-wrap">
        <span class="iconify search-ico" data-icon="carbon:search"></span>
        <input class="search-field" id="search-desk" type="text" placeholder="기기명, 브랜드 검색" autocomplete="off">
      </div>
      <button class="icon-btn" id="btn-search" aria-label="검색"><span class="iconify" data-icon="carbon:search"></span></button>
      <button class="icon-btn" id="btn-menu" aria-label="메뉴"><span class="iconify" data-icon="carbon:menu"></span></button>
    </div>
  </div>
</header>
    <main class="static-wrap">
        
            <div class="error-wrap">
                <div class="error-code">404</div>
                <h1 style="font-family:var(--f-serif); font-size: 32px; font-weight: 700; color: var(--ink); margin-bottom: 20px;">페이지를 찾을 수 없습니다</h1>
                <p style="color: var(--ink-50); margin-bottom: 48px; font-size:17px; line-height:1.6;">요청하신 페이지의 주소가 변경되었거나, 삭제되어 현재 찾을 수 없습니다.<br>입력하신 주소가 정확한지 다시 한번 확인해 주세요.</p>
                <a href="https://pickrise.com/index.html" style="display: inline-flex; align-items: center; gap: 10px; padding: 18px 40px; background: var(--ink); color: var(--white); font-weight: 700; border-radius: 50px; transition: all .2s var(--ease-out-expo);">
                    <span class="iconify" data-icon="carbon:home"></span> 홈으로 돌아가기
                </a>
            </div>
        
    </main>
    
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <div class="footer-logo"><img src="https://pickrise.com/images/logo.png" alt="PickRise" style="height:42px; width:auto; transform:translateY(2px);"></div>
      <p class="footer-about">데이터와 실사용 경험에 기반한 스마트 기기, 가전제품 리뷰 및 IT 트렌드 정보 플랫폼</p>
    </div>
    <div class="fcol"><h4>콘텐츠</h4><a href="https://pickrise.com/index.html">리뷰홈</a></div><div class="fcol"><h4>정보</h4><a href="https://pickrise.com/policy.html">면책조항/운영정책</a></div><div class="fcol"><h4>문의</h4><a href="https://pickrise.com/contact.html">비즈니스/리뷰 문의</a></div>
  </div>
  <div class="footer-bottom">
    <span>© 2026 PickRise. All rights reserved.</span>
    <span class="footer-mono">CRAFTED WITH PRECISION</span>
  </div>
</footer>

    <script>
    (function() {
        const searchBtn = document.getElementById('btn-search');
        const searchBox = document.getElementById('search-bar-mob');
        const searchInput = document.getElementById('search-mob');
        const menuBtn = document.getElementById('btn-menu');
        const sidebar = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');
        const closeBtn = document.getElementById('drawer-close');

        if(searchBtn) { searchBtn.onclick = (e) => { e.stopPropagation(); searchBox.classList.toggle('on'); if(searchBox.classList.contains('on')) searchInput.focus(); }; }
        if(menuBtn) { menuBtn.onclick = () => { sidebar.classList.add('on'); overlay.classList.add('on'); document.body.style.overflow='hidden'; }; }
        const closeMenu = () => { sidebar.classList.remove('on'); overlay.classList.remove('on'); document.body.style.overflow=''; };
        if(closeBtn) closeBtn.onclick = closeMenu;
        if(overlay) overlay.onclick = closeMenu;
    })();
    </script>
</body>
</html>
