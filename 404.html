    <style>
        :root {
            --bg-page: #ffffff;
            --bg-surface: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --accent: #2563eb;
            --border: #e2e8f0;
            --max-width: 800px;
            --header-h: 70px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg-page); color: var(--text-primary); line-height: 1.6; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; }

        .static-header { padding: 80px 20px 40px; text-align: center; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
        .static-title { font-size: 36px; font-weight: 800; color: var(--text-primary); margin-bottom: 16px; letter-spacing: -0.02em; }
        .static-desc { font-size: 16px; color: var(--text-secondary); }

        .static-body { max-width: var(--max-width); margin: 60px auto 100px; padding: 0 24px; }

        /* Policy Styles */
        .policy-content h3 { font-size: 20px; font-weight: 700; margin: 40px 0 16px; color: var(--text-primary); }
        .policy-content p { font-size: 16px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 16px; word-break: keep-all; }
        .policy-content ul { padding-left: 20px; margin-bottom: 24px; color: var(--text-secondary); }
        .policy-content li { margin-bottom: 8px; line-height: 1.6; }

        /* Contact Styles */
        .contact-card { background: #ffffff; border: 1px solid var(--border); border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 40px; }
        .contact-btn { display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; border-radius: 12px; transition: 0.2s; box-shadow: 0 4px 15px rgba(37,99,235,0.2); margin-top: 20px; }
        .contact-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(37,99,235,0.3); }
        .faq-item { border-bottom: 1px solid var(--border); padding: 24px 0; }
        .faq-q { font-size: 17px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; }
        .faq-q::before { content: 'Q.'; color: var(--accent); }
        .faq-a { font-size: 15px; color: var(--text-secondary); line-height: 1.6; display: flex; gap: 10px; align-items: flex-start; padding-left: 28px; }

        /* 404 Styles */
        .error-wrap { text-align: center; padding: 100px 20px; }
        .error-code { font-size: 120px; font-family: 'Montserrat', sans-serif; font-weight: 900; color: var(--border); line-height: 1; margin-bottom: 20px; }
        .error-msg { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 30px; }

        @media (max-width: 768px) {
            .static-header { padding: 60px 20px 30px; }
            .static-title { font-size: 28px; }
            .contact-card { padding: 30px 20px; }
        }
        
:root {
    --bg-page: #f8fafc;
    --text-main: #0f172a;
    --text-sub: #475569;
    --text-light: #94a3b8;
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --border: #e2e8f0;
    --bg-surface: #ffffff;
    --header-h: 72px;
    --layout-max: 1240px;
}
.notice-bar { background: #0f172a; color: #cbd5e1; text-align: center; padding: 10px 24px; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
.site-header { position: sticky; top: -1px; z-index: 500; background: rgb(255 255 255 / 95%); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
.header-inner{max-width:var(--layout-max);margin:0 auto;padding:0 24px;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;position:relative}
.logo{font-size:26px;font-weight:800;color:var(--text-main);display:flex;align-items:center;gap:4px}.nav{display:flex;gap:24px}.nav a { font-size: 15px; font-weight: 600; color: #0f172a; transition: 0.2s; }.nav a:hover{color:var(--primary)}.header-utils{display:flex;align-items:center;gap:12px}.search-box{position:relative;width:240px;transition:all 0.3s}
.search-input { width: 100%; padding: 14px 16px 14px 40px; font-size: 14px; background-color: #f1f5f9; border: 1px solid transparent; border-radius: 30px; color: #0f172a; outline: none; transition: 0.2s; }.search-input:focus{background-color:#fff; border-color:#3b82f6}.search-icon-pos{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none}
.m-btn { display: none; background: none; border: none; color: #0f172a; cursor: pointer; padding: 8px; font-size: 24px; align-items: center; justify-content: center; }.mobile-sidebar{position:fixed;top:0;right:-280px;width:280px;height:100vh;background:#fff;z-index:1000;box-shadow:-5px 0 20px rgba(0,0,0,0.1);transition:0.3s ease-in-out;padding:40px 24px;display:flex;flex-direction:column;gap:20px}.mobile-sidebar.active{right:0}.m-sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.m-sidebar-header img{width:fit-content}.m-nav-list{display:flex;flex-direction:column;gap:10px}.m-nav-list a{font-size:16px;font-weight:600;color:#1e293b;border-bottom:1px solid #f1f5f9;padding:12px 0;display:block}.sidebar-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:999;display:none;backdrop-filter:blur(2px)}.sidebar-overlay.active{display:block}
.footer{background:#0f172a;color:#94a3b8;padding:60px 24px 24px;font-size:14px; margin-top:60px;}.footer-inner{max-width:var(--layout-max);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:40px}.footer-brand p{margin-top:12px;font-size:13px;line-height:1.6;color:#94a3b8}.footer-logo{font-size:20px;font-weight:800;color:#fff}.footer-col h4{color:#fff;font-size:15px;font-weight:700;margin-bottom:16px}.footer-col a{display:block;color:#94a3b8;margin-bottom:10px;font-size:14px;transition:color 0.2s}.footer-col a:hover{color:#fff}.footer-bottom{max-width:var(--layout-max);margin:0 auto;padding-top:24px;border-top:1px solid #1e293b;text-align:center;font-size:13px;color:#64748b}

/* 🚀 헤더/푸터 공통 모바일 반응형 보완 */
@media (max-width:768px){
    .nav{display:none !important}
    .search-box { display: none; position: absolute; top: var(--header-h); left: 0; width: 100%; background: #ffffff; padding: 10px 16px; border-bottom: 1px solid #e2e8f0; }
    .search-box.active{display:block !important}
    .search-input { padding: 12px 16px 12px 36px; }
    .search-icon-pos{left:28px}
    .m-btn{display:flex !important}
    .footer-inner{grid-template-columns:1fr 1fr;gap:24px}
    .footer-brand{grid-column:1 / -1}
}
    </style>
</head>

    <script>
    (function() {
        const searchBtn = document.getElementById('m-search-toggle');
        const searchBox = document.getElementById('global-search-box');
